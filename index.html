<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salmahdy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}


body{

color:white;
overflow-x:hidden;

background:
linear-gradient(#0009,#0009),
url("IMG-20260701-WA0014.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

}



#lock{

height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

animation:intro 1.2s ease;

}



@keyframes intro{

0%{
opacity:0;
transform:scale(.7);
}

100%{
opacity:1;
transform:scale(1);
}

}





section{

min-height:100vh;

padding:30px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}





input{

padding:15px;

border:none;

border-radius:30px;

margin:20px;

text-align:center;

}





button{

padding:14px 30px;

border:none;

border-radius:30px;

background:#ff2d75;

color:white;

font-size:18px;

cursor:pointer;

}





.music{

position:fixed;

top:20px;

left:20px;

z-index:10;

}





#gift{

display:none;

}




#gift section{

opacity:0;

animation:show 1s forwards;

}




#gift section:nth-child(1){

animation-delay:.3s;

}


#gift section:nth-child(2){

animation-delay:.7s;

}


#gift section:nth-child(3){

animation-delay:1s;

}





@keyframes show{

from{

opacity:0;
transform:translateY(50px);

}


to{

opacity:1;
transform:translateY(0);

}

}





.name{

font-size:45px;

color:#ff8fc7;

margin:20px;

}





.counter{

font-size:22px;

margin:20px;

}





.gallery{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

width:100%;

}





.gallery img{

width:100%;

border-radius:20px;

}




.card{

background:#ffffff25;

backdrop-filter:blur(10px);

padding:20px;

border-radius:20px;

margin:15px;

animation:float 3s infinite;

}




@keyframes float{

50%{

transform:translateY(-10px);

}

}





.timeline{

border-right:3px solid #ff2d75;

padding-right:20px;

}





#end{

display:none;

}





.heart{

font-size:80px;

animation:pulse 1s infinite;

}





@keyframes pulse{

50%{

transform:scale(1.3);

}

}





.confetti{

position:fixed;

font-size:35px;

animation:fall 3s linear infinite;

}




@keyframes fall{

to{

transform:translateY(100vh);

}

}





@keyframes floatHeart{


0%{

bottom:-20px;

opacity:1;

}


100%{

bottom:110vh;

opacity:0;

}

}


</style>

</head>



<body>




<audio id="song" loop>

<source src="InShot_20260701_065704478_20260701_065740.mp3">

</audio>



<button class="music" onclick="playSong()">🎵</button>







<section id="lock">


<h1>الباسورد يمزهه</h1>


<input id="pass" placeholder="اكتبيه هنااا">


<button onclick="openSite()">

ادخلي يلا 

</button>


</section>








<div id="gift">





<section>


<h1>

لأجمل حد في حياتي 

</h1>


<div class="name" id="name"></div>


<h2>

من أول يوم لحد دلوقتي 

</h2>


<div class="counter" id="counter"></div>



</section>








<section>


<h1>

شويه كلام تحفه من تحفتي

</h1>



<div class="gallery">


<img src="Screenshot_20260701-063157.jpg">

<img src="Screenshot_20260701-063248.jpg">

<img src="Screenshot_20260701-063314.jpg">

<img src="Screenshot_20260701-063402.jpg">


</div>



</section>








<section>


<h1>

تعرفي؟

</h1>




<div class="card">

وجودك في حياتي هو اللي خلاني احبها

</div>




<div class="card">

كل لحظه معاكي بحبك اكتر من اللي قبلها يعمريي

</div>




</section>

















<section id="end">


<div class="heart">

</div>



<h1>

بحبك اوي يلولييي

</h1>



<p>

الموقع كده خلص بس قصتنا مش هتخلص ان شاء الله

</p>



</section>







</div>








<script>





function openSite(){


let pass=document.getElementById("pass").value;



if(pass=="salmahdy"){



document.getElementById("lock").style.display="none";


document.getElementById("gift").style.display="block";





let text="لولييي";


let i=0;



let timer=setInterval(()=>{


document.getElementById("name").innerHTML+=text[i];


i++;


if(i==text.length)

clearInterval(timer);


},250);






setTimeout(()=>{



document.getElementById("end").style.display="flex";



for(let i=0;i<50;i++){


let h=document.createElement("div");


h.className="confetti";


h.innerHTML="💗";


h.style.left=Math.random()*100+"%";



document.body.appendChild(h);



}



},7000);



}


else{


alert("غلط يهانم");


}


}







function playSong(){

document.getElementById("song").play();

}







let start=new Date("2026-04-24");



setInterval(()=>{


let now=new Date();


let diff=now-start;



let days=Math.floor(diff/(1000*60*60*24));



document.getElementById("counter").innerHTML=

days+" يوم مع بعض ";



},1000);








function createHeart(){


let heart=document.createElement("div");




heart.style.position="fixed";


heart.style.left=Math.random()*100+"%";


heart.style.bottom="-20px";


heart.style.fontSize="30px";


heart.style.animation="floatHeart 5s linear";



document.body.appendChild(heart);



setTimeout(()=>{

heart.remove();

},5000);



}



setInterval(createHeart,900);




</script>




</body>

</html>
